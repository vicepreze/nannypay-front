<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nounoulink — Rejoindre une garde</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .rejoindre-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      background: var(--paper);
    }
    .rejoindre-card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      width: min(420px, 100%);
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .rejoindre-logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--sage);
      margin-bottom: 4px;
    }
    .rejoindre-invite {
      background: var(--sage-light);
      border-radius: 10px;
      padding: 14px 16px;
      margin: 20px 0 24px;
      font-size: 14px;
      color: var(--ink);
    }
    .rejoindre-invite strong { color: var(--sage); }
    .tabs {
      display: flex;
      border-bottom: 1.5px solid var(--line);
      margin-bottom: 24px;
      gap: 0;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 10px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--dust);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      transition: all .15s;
    }
    .tab-btn.active {
      color: var(--sage);
      border-bottom-color: var(--sage);
      font-weight: 500;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .field { margin-bottom: 14px; }
    .field label { font-size: 12px; color: var(--dust); display: block; margin-bottom: 4px; }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      box-sizing: border-box;
    }
    .field input:focus { outline: none; border-color: var(--sage); }
    .btn-submit {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: var(--sage);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
    .msg-erreur {
      background: #fce4ec;
      color: #c62828;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .msg-info {
      background: var(--sage-light);
      color: var(--sage);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="rejoindre-shell">
  <div class="rejoindre-card">
    <div class="rejoindre-logo">nounoulink</div>
    <div style="font-size:13px;color:var(--dust);margin-bottom:4px">Garde partagée</div>

    <!-- Chargement / erreur token -->
    <div id="zone-chargement" style="padding:24px 0;text-align:center;color:var(--dust);font-size:13px">
      Vérification du lien…
    </div>

    <!-- Contenu principal (masqué jusqu'à validation du token) -->
    <div id="zone-principale" style="display:none">
      <div class="rejoindre-invite" id="invite-info">
        Vous avez été invité(e) à rejoindre la garde <strong id="garde-nom-display">—</strong>.
      </div>

      <!-- Onglets -->
      <div class="tabs">
        <button class="tab-btn active" id="tab-register" onclick="switchTab('register')">Créer un compte</button>
        <button class="tab-btn" id="tab-login" onclick="switchTab('login')">J'ai déjà un compte</button>
      </div>

      <!-- Message d'erreur partagé -->
      <div id="msg-erreur" class="msg-erreur" style="display:none"></div>
      <div id="msg-info" class="msg-info" style="display:none"></div>

      <!-- Panneau inscription -->
      <div class="tab-panel active" id="panel-register">
        <div class="field">
          <label>Nom de votre famille (ex. "Famille Martin")</label>
          <input type="text" id="reg-nom-famille" placeholder="Famille Martin" autocomplete="organization">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="vous@exemple.fr" autocomplete="email">
        </div>
        <div class="field">
          <label>Mot de passe (8 caractères minimum)</label>
          <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="btn-submit" id="btn-register" onclick="register()">Créer mon compte et rejoindre →</button>
      </div>

      <!-- Panneau connexion -->
      <div class="tab-panel" id="panel-login">
        <div class="field">
          <label>Nom de votre famille</label>
          <input type="text" id="log-nom-famille" placeholder="Famille Martin" autocomplete="organization">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="log-email" placeholder="vous@exemple.fr" autocomplete="email">
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="log-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-submit" id="btn-login" onclick="login()">Me connecter et rejoindre →</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { auth, invitation, gardes, saveToken, saveGarde } from './js/api.js';

const params = new URLSearchParams(location.search);
const token  = params.get('token');
let gardeId  = null;

// ── Validation du token au chargement ────────────────────────────────────────

async function init() {
  if (!token) {
    afficherErreur('Lien invalide. Demandez un nouveau lien à la Famille A.');
    return;
  }
  try {
    const data = await invitation.validerToken(token);
    gardeId = data.garde.id;
    document.getElementById('garde-nom-display').textContent = data.garde.nom;
    document.getElementById('zone-chargement').style.display = 'none';
    document.getElementById('zone-principale').style.display = '';
  } catch(e) {
    afficherErreur(e.message || 'Ce lien est invalide ou a déjà été utilisé.');
  }
}

function afficherErreur(msg) {
  document.getElementById('zone-chargement').innerHTML =
    '<div style="background:#fce4ec;color:#c62828;border-radius:8px;padding:14px 16px;font-size:13px;margin-top:16px">'
    + msg
    + '</div><div style="margin-top:16px;font-size:13px"><a href="/index.html" style="color:var(--sage)">← Retour à l\'accueil</a></div>';
}

// ── Onglets ───────────────────────────────────────────────────────────────────

window.switchTab = function(tab) {
  ['register', 'login'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('msg-erreur').style.display = 'none';
  document.getElementById('msg-info').style.display = 'none';
};

function showErr(msg) {
  const el = document.getElementById('msg-erreur');
  el.textContent = msg;
  el.style.display = '';
}
function showInfo(msg) {
  const el = document.getElementById('msg-info');
  el.textContent = msg;
  el.style.display = '';
}

// ── Rejoindre après auth (commun aux deux chemins) ────────────────────────────

async function rejoindreGarde(nomFamille) {
  showInfo('Connexion à la garde…');
  const data = await gardes.rejoindre(token, nomFamille);
  saveGarde(data.garde.id || gardeId);
  window.location.href = '/garde.html?id=' + (data.garde.id || gardeId);
}

// ── Inscription ───────────────────────────────────────────────────────────────

window.register = async function() {
  const nomFamille = document.getElementById('reg-nom-famille').value.trim();
  const email      = document.getElementById('reg-email').value.trim();
  const password   = document.getElementById('reg-password').value;

  document.getElementById('msg-erreur').style.display = 'none';
  document.getElementById('msg-info').style.display = 'none';

  if (!nomFamille) return showErr('Entrez le nom de votre famille.');
  if (!email)      return showErr('Entrez votre email.');
  if (password.length < 8) return showErr('Le mot de passe doit faire au moins 8 caractères.');

  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.textContent = 'Création du compte…';

  try {
    // register() sauvegarde déjà le token JWT dans localStorage
    await auth.register(email, password, null, null);
    await rejoindreGarde(nomFamille);
  } catch(e) {
    showErr(e.message || 'Erreur lors de la création du compte.');
    btn.disabled = false;
    btn.textContent = 'Créer mon compte et rejoindre →';
  }
};

// ── Connexion ─────────────────────────────────────────────────────────────────

window.login = async function() {
  const nomFamille = document.getElementById('log-nom-famille').value.trim();
  const email      = document.getElementById('log-email').value.trim();
  const password   = document.getElementById('log-password').value;

  document.getElementById('msg-erreur').style.display = 'none';
  document.getElementById('msg-info').style.display = 'none';

  if (!nomFamille) return showErr('Entrez le nom de votre famille.');
  if (!email)      return showErr('Entrez votre email.');
  if (!password)   return showErr('Entrez votre mot de passe.');

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Connexion…';

  try {
    await auth.login(email, password);
    await rejoindreGarde(nomFamille);
  } catch(e) {
    showErr(e.message || 'Email ou mot de passe incorrect.');
    btn.disabled = false;
    btn.textContent = 'Me connecter et rejoindre →';
  }
};

// ── Touches Entrée ────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const activePanel = document.querySelector('.tab-panel.active');
  if (!activePanel) return;
  if (activePanel.id === 'panel-register') register();
  else if (activePanel.id === 'panel-login') login();
});

init();
</script>
</body>
</html>
