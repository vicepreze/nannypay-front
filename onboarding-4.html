<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nounoulink — Planning type (4/5)</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .planning-card { border:1.5px solid var(--line); border-radius:var(--radius); background:#fff; margin-bottom:16px; overflow:hidden; }
    .ph-copy { font-size:11px; color:var(--blue); cursor:pointer; text-decoration:underline; }
    .jours-grid { display:grid; grid-template-columns:repeat(5, 1fr); border-top:1.5px solid var(--line); }
    .jour-col { padding:8px; border-right:.5px solid var(--line); text-align:center; }
    .plage-item { background:var(--paper); border-radius:4px; margin-bottom:4px; padding:4px; font-size:11px; }
    .plage-item input { border:none; background:transparent; width:45px; font-size:11px; }
  </style>
</head>
<body>

<div class="ob-shell">
  <nav class="ob-side">
    <a href="/" class="ob-logo">nounoulink<em>.</em></a>
    <div class="ob-steps">
      <div class="ob-step done"><div class="ob-step-num">✓</div><div><div class="ob-step-label">Votre garde</div><div class="ob-step-sub" id="side-garde">—</div></div></div>
      <div class="ob-step done"><div class="ob-step-num">✓</div><div><div class="ob-step-label">Votre nounou</div><div class="ob-step-sub" id="side-nounou">—</div></div></div>
      <div class="ob-step done"><div class="ob-step-num">✓</div><div><div class="ob-step-label">Les enfants</div><div class="ob-step-sub" id="side-enfants">—</div></div></div>
      <div class="ob-step active"><div class="ob-step-num">4</div><div><div class="ob-step-label">Planning type</div><div class="ob-step-sub">Horaires par enfant</div></div></div>
      <div class="ob-step future"><div class="ob-step-num">5</div><div><div class="ob-step-label">Taux & aides</div><div class="ob-step-sub">Salaire, indemnités</div></div></div>
    </div>
    <div class="ob-side-footer" id="side-footer">—</div>
  </nav>

  <main class="ob-main">
    <div class="ob-progress"><div class="ob-progress-fill" style="width:80%"></div></div>
    <h1 class="ob-headline">Planning — semaine modèle</h1>
    <p class="ob-subline">Définissez les horaires habituels. Astuce : complétez le lundi et copiez sur la semaine.</p>

    <div id="plannings-zone"></div>

    <div class="ob-actions">
      <button class="btn-ghost" onclick="window.location.href='/onboarding-3.html'">← Étape 3</button>
      <button class="btn-primary" id="btn-next" onclick="window.handleNext()">Continuer — Taux & aides →</button>
    </div>
  </main>
</div>

<script type="module">
import { requireLogin, draft } from './js/api.js';

const JOURS = ['lundi','mardi','mercredi','jeudi','vendredi'];

window.renderAll = function() {
  const zone = document.getElementById('plannings-zone');
  zone.innerHTML = window.enfants.map(e => `
    <div class="planning-card">
      <div style="padding:12px; display:flex; justify-content:space-between; align-items:center;">
        <strong>${e.prenom}</strong>
        <span class="ph-copy" onclick="window.copyMonday('${e.id}')">Appliquer le lundi à toute la semaine</span>
      </div>
      <div class="jours-grid">
        ${JOURS.map((j, i) => `
          <div class="jour-col">
            <div style="font-size:10px; color:var(--dust); margin-bottom:8px;">${j.toUpperCase().slice(0,3)}</div>
            <div class="plage-item">
              <input type="time" value="${window.state[e.id][i].debut}" onchange="window.updateTime('${e.id}',${i},'debut',this.value)">
              -
              <input type="time" value="${window.state[e.id][i].fin}" onchange="window.updateTime('${e.id}',${i},'fin',this.value)">
            </div>
          </div>
        `).join('')}
      </div>
    </div>`).join('');
};

window.updateTime = function(eid, jourIdx, key, val) {
  window.state[eid][jourIdx][key] = val;
};

window.copyMonday = function(eid) {
  const mon = window.state[eid][0];
  JOURS.forEach((_, i) => {
    window.state[eid][i] = { ...mon };
  });
  window.renderAll();
};

window.handleNext = async function() {
  const jours = [];
  window.enfants.forEach(e => {
    JOURS.forEach((j, i) => {
      jours.push({
        enfantId: e.id, 
        jourSemaine: j,
        debut: window.state[e.id][i].debut,
        fin: window.state[e.id][i].fin,
        actif: true
      });
    });
  });

  draft.set({ jours, hNormalesSemaine: 40 }); // Calcul simplifié pour le moment
  window.location.href = '/onboarding-5.html';
};

// Init
requireLogin();
const d = draft.get();
window.enfants = d.enfants || [];
window.state = {};

window.enfants.forEach(e => {
  window.state[e.id] = JOURS.map(() => ({ debut: '08:45', fin: '18:00' }));
});

document.getElementById('side-garde').textContent = d.nom || '—';
window.renderAll();
</script>
</body>
</html>
