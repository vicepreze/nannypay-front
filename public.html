<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nounoulink — Récapitulatif mensuel</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pub-shell { min-height:100vh; background:var(--paper); }

    /* ── HEADER ── */
    .pub-header { background:#fff; border-bottom:1px solid var(--line); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
    .pub-logo { font-family:'DM Serif Display',serif; font-size:18px; color:var(--ink); text-decoration:none; }
    .pub-logo em { color:var(--sage); font-style:italic; }
    .pub-header-info { text-align:right; font-size:12px; color:var(--dust); }

    /* ── BODY ── */
    .pub-body { max-width:680px; margin:0 auto; padding:36px 24px; }

    /* ── BLOC NARRATIF ── */
    .narratif-pub { background:var(--sage-light); border:1.5px solid var(--sage-mid); border-radius:var(--radius); padding:20px 24px; margin-bottom:24px; }
    .narratif-pub-eyebrow { font-size:10px; font-weight:500; color:var(--sage); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
    .narratif-pub-title { font-family:'DM Serif Display',serif; font-size:22px; color:var(--ink); margin-bottom:10px; }
    .narratif-pub-text { font-size:14px; color:#2a4027; line-height:1.7; }

    /* ── EVENTS ── */
    .evt-list { margin-top:12px; display:flex; flex-direction:column; gap:6px; }
    .evt-pill { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; font-size:13px; }
    .evt-pill.cp    { background:#dbeafe; color:#1e40af; }
    .evt-pill.mal   { background:#fee2e2; color:#991b1b; }
    .evt-pill.ferie { background:#f3f4f6; color:#374151; }
    .evt-pill.abs   { background:var(--blue-light); color:var(--blue); }
    .evt-pill-icon  { font-size:16px; }
    .evt-pill-text  { flex:1; }
    .evt-pill-jours { font-size:11px; opacity:.7; margin-left:auto; }

    /* ── TABLEAU ECART ── */
    .ecart-card { background:#fff; border:1.5px solid var(--line); border-radius:var(--radius); overflow:hidden; margin-bottom:20px; }
    .ecart-hdr { padding:12px 18px; border-bottom:.5px solid var(--line); font-size:12px; font-weight:500; color:var(--dust); text-transform:uppercase; letter-spacing:.06em; }

    /* ── TOTAL NOUNOU ── */
    .total-card { background:#fff; border:1.5px solid #d4a017; border-radius:var(--radius); padding:20px 24px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; }
    .total-amount { font-size:32px; font-weight:500; color:var(--ink); }
    .total-label { font-size:12px; color:var(--dust); margin-top:4px; }

    /* ── FAMILLES CARDS ── */
    .familles-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .fam-pub-card { background:#fff; border:1.5px solid var(--line); border-radius:var(--radius); overflow:hidden; }
    .fam-pub-card.a { border-top:2px solid var(--blue); }
    .fam-pub-card.b { border-top:2px solid var(--sage); }
    .fam-pub-hdr { padding:10px 14px; background:var(--paper); border-bottom:.5px solid var(--line); font-size:12px; font-weight:500; display:flex; align-items:center; gap:6px; }
    .fam-pub-body { padding:12px 14px; }
    .fam-pub-line { display:flex; justify-content:space-between; font-size:12px; padding:3px 0; color:var(--dust); }
    .fam-pub-line.total { font-weight:500; color:var(--ink); font-size:13px; margin-top:4px; padding-top:6px; border-top:.5px solid var(--line); }

    /* ── CP ── */
    .cp-card { background:#fff; border:1.5px solid var(--line); border-radius:var(--radius); overflow:hidden; margin-bottom:20px; }
    .cp-card-body { padding:16px 18px; }
    .cp-bar-wrap { margin:10px 0 6px; }
    .cp-bar { height:8px; border-radius:4px; background:var(--line); overflow:hidden; }
    .cp-fill { height:100%; background:var(--sage); border-radius:4px; transition:width .4s; }

    /* ── REJOINDRE ── */
    .rejoindre-card { background:var(--blue-light); border:1.5px solid var(--blue-mid); border-radius:var(--radius); padding:20px 24px; text-align:center; margin-bottom:20px; }
    .rejoindre-title { font-family:'DM Serif Display',serif; font-size:18px; margin-bottom:6px; }
    .rejoindre-sub { font-size:13px; color:var(--dust); margin-bottom:16px; line-height:1.6; }

    /* ── STATUT ── */
    .statut-band { padding:10px 24px; font-size:12px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--line); }
    .statut-dot { width:8px; height:8px; border-radius:50%; }

    /* ── ERREUR ── */
    .pub-error { text-align:center; padding:80px 24px; }
    .pub-error-icon { font-size:40px; margin-bottom:16px; }
    .pub-error h2 { font-family:'DM Serif Display',serif; font-size:24px; margin-bottom:8px; }
    .pub-error p { color:var(--dust); max-width:340px; margin:0 auto; }
  </style>
</head>
<body>

<div class="pub-shell">

  <!-- HEADER -->
  <header class="pub-header">
    <a href="/" class="pub-logo">nounoulink<em>.</em></a>
    <div class="pub-header-info" id="header-info">Chargement…</div>
  </header>

  <!-- STATUT BAND -->
  <div class="statut-band" id="statut-band" style="display:none">
    <div class="statut-dot" id="statut-dot"></div>
    <span id="statut-text">—</span>
  </div>

  <!-- CONTENU -->
  <div class="pub-body" id="pub-body">
    <!-- Skeleton -->
    <div style="padding:40px 0;text-align:center;color:var(--dust)">
      <div class="spinner" style="border-color:var(--sage-mid);border-top-color:var(--sage);width:24px;height:24px;margin:0 auto 12px"></div>
      Chargement du récapitulatif…
    </div>
  </div>

</div>

<script type="module">
import { public_ } from './js/api.js';

const params = new URLSearchParams(window.location.search);
const token  = params.get('token');

const MOIS_LABELS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

async function load() {
  if (!token) { showError('Lien invalide', 'Ce lien de partage ne correspond à aucune garde.'); return; }

  try {
    const data = await public_.get(token);
    render(data);
  } catch(e) {
    if (e.status === 404) showError('Lien expiré', 'Ce lien de partage est invalide ou a expiré. Demandez un nouveau lien à la Famille A.');
    else showError('Erreur', e.message || 'Impossible de charger le récapitulatif.');
  }
}

function render(data) {
  const { garde, nounou, familles, solde_cp, dernier_mois } = data;

  // Header
  document.getElementById('header-info').innerHTML =
    `<strong>${garde.nom}</strong><br>Depuis le ${formatDate(garde.date_debut)}`;

  // Statut band
  if (dernier_mois) {
    const band = document.getElementById('statut-band');
    band.style.display = '';
    const statuts = { en_cours:'#f59e0b', valide_a:'var(--blue)', valide_ab:'var(--sage)', declare:'var(--sage)' };
    const labels  = { en_cours:'Mois en cours', valide_a:'Validé par Famille A', valide_ab:'Validé par les deux familles', declare:'Déclaré sur Pajemploi' };
    document.getElementById('statut-dot').style.background = statuts[dernier_mois.statut]||'var(--dust)';
    document.getElementById('statut-text').textContent = `${moisLabel(dernier_mois.annee, dernier_mois.mois)} · ${labels[dernier_mois.statut]||dernier_mois.statut}`;
  }

  // Corps
  const body = document.getElementById('pub-body');
  body.innerHTML = '';

  // ── BLOC NARRATIF ──────────────────────────────────────────────
  const narratifEl = document.createElement('div');
  narratifEl.className = 'narratif-pub';

  let narratifHtml;
  const evts = dernier_mois?.evenements || [];
  const cp   = evts.filter(e=>e.type==='conge_paye');
  const mal  = evts.filter(e=>e.type==='maladie_nounou');
  const absA = evts.filter(e=>e.type==='absence_famille_a');
  const absB = evts.filter(e=>e.type==='absence_famille_b');

  if (!dernier_mois) {
    narratifHtml = `<div class="narratif-pub-text">Aucun mois calculé pour l'instant.</div>`;
  } else if (!evts.length) {
    narratifHtml = `
      <div class="narratif-pub-text">
        Aucun événement ce mois-ci. <strong>Le salaire mensualisé théorique s'applique.</strong>
      </div>`;
  } else {
    const evtItems = [
      ...cp.map(e=>`<div class="evt-pill cp"><span class="evt-pill-icon">🏖</span><span class="evt-pill-text">${e.nb_jours} jour${e.nb_jours>1?'s':''} de congés payés<br><span style="font-size:11px;opacity:.7">${formatDate(e.date_debut)} → ${formatDate(e.date_fin)}</span></span></div>`),
      ...mal.map(e=>`<div class="evt-pill mal"><span class="evt-pill-icon">🤒</span><span class="evt-pill-text">${e.nb_jours} jour${e.nb_jours>1?'s':''} d'arrêt maladie<br><span style="font-size:11px;opacity:.7">${formatDate(e.date_debut)} → ${formatDate(e.date_fin)}</span></span></div>`),
      ...absA.map(e=>`<div class="evt-pill abs"><span class="evt-pill-icon">🏠</span><span class="evt-pill-text">Absence ${familles.find(f=>f.label==='A')?.nom_affiche||'Famille A'}<br><span style="font-size:11px;opacity:.7">${formatDate(e.date_debut)} → ${formatDate(e.date_fin)}</span></span></div>`),
      ...absB.map(e=>`<div class="evt-pill abs" style="background:var(--sage-light);color:var(--sage)"><span class="evt-pill-icon">🏡</span><span class="evt-pill-text">Absence ${familles.find(f=>f.label==='B')?.nom_affiche||'Famille B'}<br><span style="font-size:11px;opacity:.7">${formatDate(e.date_debut)} → ${formatDate(e.date_fin)}</span></span></div>`),
    ].join('');
    narratifHtml = `
      <div class="narratif-pub-text">${evts.length} événement${evts.length>1?'s':''} ce mois-ci.</div>
      <div class="evt-list">${evtItems}</div>`;
  }

  narratifEl.innerHTML = `
    <div class="narratif-pub-eyebrow">Résumé · ${dernier_mois ? moisLabel(dernier_mois.annee, dernier_mois.mois) : '—'}</div>
    <div class="narratif-pub-title">${garde.nom}</div>
    ${narratifHtml}`;
  body.appendChild(narratifEl);

  // ── TABLEAU ÉCART ───────────────────────────────────────────────
  if (evts.some(e=>['conge_paye','maladie_nounou'].includes(e.type))) {
    const ecartEl = document.createElement('div');
    ecartEl.className = 'ecart-card';
    const rows = [
      ...cp.map(e=>['CP ('+e.nb_jours+'j)', 'Maintenu ✓', '— non dû (repas)', 'Maintenu', 'Maintenu']),
      ...mal.map(e=>['Maladie ('+e.nb_jours+'j)', 'Déduit', '— non dû (repas)', 'Déduit', 'Déduit']),
      ...absA.map(e=>['Absence Fam. A ('+e.nb_jours+'j)', 'Maintenu ✓', 'Maintenu ✓', '—', '—']),
      ...absB.map(e=>['Absence Fam. B ('+e.nb_jours+'j)', 'Maintenu ✓', 'Maintenu ✓', '—', '—']),
    ];
    ecartEl.innerHTML = `
      <div class="ecart-hdr">Sources d'écart vs mois standard</div>
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead><tr>
          <th style="padding:6px 10px;text-align:left;background:var(--paper);border-bottom:.5px solid var(--line);color:var(--dust)">Événement</th>
          <th style="padding:6px 10px;text-align:center;background:var(--paper);border-bottom:.5px solid var(--line);color:var(--dust)">Salaire</th>
          <th style="padding:6px 10px;text-align:center;background:var(--paper);border-bottom:.5px solid var(--line);color:var(--dust)">Repas</th>
          <th style="padding:6px 10px;text-align:center;background:var(--paper);border-bottom:.5px solid var(--line);color:var(--blue)">Fam. A</th>
          <th style="padding:6px 10px;text-align:center;background:var(--paper);border-bottom:.5px solid var(--line);color:var(--sage)">Fam. B</th>
        </tr></thead>
        <tbody>${rows.map(r=>`<tr>${r.map((c,i)=>`<td style="padding:6px 10px;border-bottom:.5px solid var(--line);text-align:${i===0?'left':'center'}">${c}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>`;
    body.appendChild(ecartEl);
  }

  // ── TOTAL NOUNOU ────────────────────────────────────────────────
  if (dernier_mois?.virement_total) {
    const totalEl = document.createElement('div');
    totalEl.className = 'total-card';
    totalEl.innerHTML = `
      <div>
        <div style="font-size:14px;font-weight:500">${nounou ? `${nounou.prenom} ${nounou.nom}` : 'La nounou'} reçoit ce mois</div>
        <div class="total-label">Virement total des deux familles</div>
      </div>
      <div>
        <div class="total-amount">${fmt(dernier_mois.virement_total)}</div>
      </div>`;
    body.appendChild(totalEl);
  }

  // ── FAMILLES ────────────────────────────────────────────────────
  const famGrid = document.createElement('div');
  famGrid.className = 'familles-grid';
  famGrid.innerHTML = familles.map(f => `
    <div class="fam-pub-card ${f.label.toLowerCase()}">
      <div class="fam-pub-hdr">
        <span style="width:7px;height:7px;border-radius:50%;background:var(--${f.label==='A'?'blue':'sage'});display:inline-block"></span>
        ${f.nom_affiche || 'Famille ' + f.label}
      </div>
      <div class="fam-pub-body">
        <div style="font-size:12px;color:var(--dust);line-height:1.6">
          Consultez votre espace pour voir<br>votre virement détaillé et le guide Pajemploi.
        </div>
      </div>
    </div>`).join('');
  body.appendChild(famGrid);

  // ── SOLDE CP ────────────────────────────────────────────────────
  if (solde_cp) {
    const cpEl = document.createElement('div');
    cpEl.className = 'cp-card';
    const acquis = solde_cp.acquis || 0;
    const pris   = solde_cp.pris   || 0;
    const solde  = solde_cp.solde  || (acquis - pris);
    const pct    = acquis > 0 ? Math.min(100, pris/acquis*100) : 0;
    cpEl.innerHTML = `
      <div class="side-card-hdr" style="padding:12px 16px;font-size:12px;font-weight:500;color:var(--dust);text-transform:uppercase;letter-spacing:.06em;border-bottom:.5px solid var(--line)">Congés payés</div>
      <div class="cp-card-body">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;color:var(--dust)">Acquis</span>
          <span style="font-size:13px;font-weight:500">${acquis} jours</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:13px;color:var(--dust)">Pris</span>
          <span style="font-size:13px;font-weight:500">${pris} jours</span>
        </div>
        <div class="cp-bar-wrap">
          <div class="cp-bar"><div class="cp-fill" style="width:${pct}%"></div></div>
        </div>
        <div style="font-size:12px;color:var(--dust)">Solde : <strong style="color:${solde<0?'var(--red)':'var(--ink)'}">${solde} jours${solde<0?' ⚠':''}</strong></div>
      </div>`;
    body.appendChild(cpEl);
  }

  // ── REJOINDRE (si non connecté) ─────────────────────────────────
  if (!localStorage.getItem('nl_token')) {
    const joinEl = document.createElement('div');
    joinEl.className = 'rejoindre-card';
    joinEl.innerHTML = `
      <div class="rejoindre-title">Rejoindre cette garde</div>
      <div class="rejoindre-sub">Créez un compte pour accéder à votre espace détaillé, saisir vos congés ou vos absences.</div>
      <button class="btn-primary" onclick="window.location.href='/index.html'" style="margin:0 auto">Créer un compte →</button>`;
    body.appendChild(joinEl);
  }

  // ── NOTE DE BAS DE PAGE ─────────────────────────────────────────
  const noteEl = document.createElement('div');
  noteEl.style = 'text-align:center;font-size:11px;color:var(--dust);margin-top:32px;line-height:1.6';
  noteEl.innerHTML = `Ce récapitulatif est partagé par la Famille A via <strong>nounoulink</strong>.<br>Les montants exacts par famille sont visibles uniquement après connexion.`;
  body.appendChild(noteEl);
}

function showError(title, msg) {
  document.getElementById('pub-body').innerHTML = `
    <div class="pub-error">
      <div class="pub-error-icon">🔒</div>
      <h2>${title}</h2>
      <p>${msg}</p>
    </div>`;
}

function fmt(n) { return (Math.round(n*100)/100).toFixed(2) + ' €'; }
function formatDate(d) { if(!d) return '—'; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
function moisLabel(y,m) { return ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][m-1]+' '+y; }

load();
</script>

</body>
</html>
